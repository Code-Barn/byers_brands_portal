{% extends 'base.html' %}

{% block title %}Two-Factor Authentication - Byers Brands{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900 rounded-full mx-auto flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                Two-Factor Authentication
            </h1>
        </div>

        <p class="text-gray-600 dark:text-gray-400 mb-6 text-center">
            Enter the code from your authenticator app to complete login.
        </p>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Authentication Code
                </label>
                <input type="text" name="code" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white text-center text-2xl font-mono tracking-widest" placeholder="000000" maxlength="6" required>
            </div>

            <div class="text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">Or use a backup code:</p>
                <input type="text" name="backup_code" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white text-center font-mono" placeholder="BACKUP-CODE" maxlength="8">
            </div>

            <button type="submit" class="w-full px-4 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors">
                Verify
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'accounts:logout' %}" class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">
                Cancel and return to login
            </a>
        </div>
    </div>
</div>
{% endblock %}
