{% extends 'base.html' %}

{% block title %}Disable MFA - Byers Brands{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 text-center">
            Disable Two-Factor Authentication
        </h1>

        <div class="bg-yellow-50 dark:bg-yellow-900 border border-yellow-200 dark:border-yellow-700 rounded-lg p-4 mb-6">
            <p class="text-yellow-800 dark:text-yellow-200 text-sm">
                Warning: Disabling MFA will make your account less secure. Are you sure you want to continue?
            </p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    Enter your password to confirm
                </label>
                <input type="password" name="password" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg dark:bg-gray-700 dark:text-white" required>
            </div>

            <button type="submit" class="w-full px-4 py-3 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700 transition-colors">
                Disable MFA
            </button>

            <a href="{% url 'accounts:profile' %}" class="block text-center text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
